# ═══════════════════════════════════════════════════════════
# SETUP GUIDE — Add your API keys here
# ═══════════════════════════════════════════════════════════
#
# 1. GOOGLE MAPS (already set above)
#    Used for: food ordering map, driver navigation, live tracking
#
# 2. OPENWEATHERMAP (free tier)
#    Get key: https://openweathermap.org/api -> Sign up -> API Keys
#    Used for: weather surcharge, driver weather alerts
#
# 3. GOOGLE OAUTH (for Sign In with Google button)
#    Step 1: Go to https://console.cloud.google.com
#    Step 2: APIs & Services -> Credentials -> Create Credentials -> OAuth 2.0 Client ID
#    Step 3: Application type = Web application
#    Step 4: Authorized JavaScript origins: http://localhost:8080
#    Step 5: Copy Client ID (ends in .apps.googleusercontent.com) below
#    NOTE: Without this key, Google sign-in shows "not configured" message
#          Email/password login still works perfectly without it
# ═══════════════════════════════════════════════════════════
